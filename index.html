// ───────────────────────────────────────────────────────────
// Google Calendar integration
// ───────────────────────────────────────────────────────────
const GCAL_SCOPE = 'https://www.googleapis.com/auth/calendar';

const loadGcalToken = () => {
  try {
    const raw = localStorage.getItem('planner:gcalToken');
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (!parsed.token || !parsed.expiry || parsed.expiry < Date.now()) return null;
    return parsed;
  } catch { return null; }
};
const saveGcalToken = (tokenObj) => localStorage.setItem('planner:gcalToken', JSON.stringify(tokenObj));
const clearGcalToken = () => localStorage.removeItem('planner:gcalToken');

function useGoogleAuth(clientId) {
  const [token, setToken] = useState(loadGcalToken);
  const [ready, setReady] = useState(false);
  const tokenClientRef = useRef(null);

  useEffect(() => {
    if (!clientId) { setReady(false); return; }
    let timer;
    const init = () => {
      if (!window.google?.accounts?.oauth2) {
        timer = setTimeout(init, 200);
        return;
      }
      tokenClientRef.current = window.google.accounts.oauth2.initTokenClient({
        client_id: clientId,
        scope: GCAL_SCOPE,
        callback: (response) => {
          if (response.error) {
            console.error('OAuth error:', response);
            alert('Ошибка входа: ' + (response.error_description || response.error));
            return;
          }
          const t = {
            token: response.access_token,
            expiry: Date.now() + (response.expires_in - 60) * 1000,
          };
          saveGcalToken(t);
          setToken(t);
        },
      });
      setReady(true);
    };
    init();
    return () => { if (timer) clearTimeout(timer); };
  }, [clientId]);

  const signIn = () => {
    if (!tokenClientRef.current) {
      alert('Google API ещё грузится, попробуй через секунду');
      return;
    }
    tokenClientRef.current.requestAccessToken({ prompt: token ? '' : 'consent' });
  };
  const signOut = () => {
    if (token?.token && window.google?.accounts?.oauth2) {
      window.google.accounts.oauth2.revoke(token.token, () => {});
    }
    clearGcalToken();
    setToken(null);
  };
  return { token, signIn, signOut, ready };
}

async function gcalFetchEvents(token, ym, day) {
  const [y, m] = ym.split('-').map(Number);
  const start = new Date(y, m - 1, day, 0, 0, 0);
  const end = new Date(y, m - 1, day, 23, 59, 59);
  const url = new URL('https://www.googleapis.com/calendar/v3/calendars/primary/events');
  url.searchParams.set('timeMin', start.toISOString());
  url.searchParams.set('timeMax', end.toISOString());
  url.searchParams.set('singleEvents', 'true');
  url.searchParams.set('orderBy', 'startTime');
  const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
  if (!res.ok) throw new Error('Calendar fetch failed: ' + res.status);
  const data = await res.json();
  return data.items || [];
}

async function gcalCreateEvent(token, task, ym, day) {
  const [y, m] = ym.split('-').map(Number);
  let start, end;
  if (task.time && /^\d{1,2}:\d{2}$/.test(task.time)) {
    const [h, mn] = task.time.split(':').map(Number);
    start = new Date(y, m - 1, day, h, mn, 0);
    end = new Date(start.getTime() + 60 * 60 * 1000);
  } else {
    // All-day
    start = { date: `${ym}-${String(day).padStart(2, '0')}` };
    const nextDay = new Date(y, m - 1, day + 1);
    end = { date: `${nextDay.getFullYear()}-${String(nextDay.getMonth() + 1).padStart(2, '0')}-${String(nextDay.getDate()).padStart(2, '0')}` };
  }
  const event = {
    summary: task.title || 'Задача',
    description: task.note || undefined,
    start: start instanceof Date ? { dateTime: start.toISOString() } : start,
    end: end instanceof Date ? { dateTime: end.toISOString() } : end,
  };
  const res = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
    method: 'POST',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(event),
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error('Calendar create failed: ' + res.status + ' ' + err);
  }
  return await res.json();
}

// Convert Google Calendar event to local task

    time,
    note: ev.description || '',

  };
};

// Read file, auto-detect UTF-8 vs Windows-1251 encoding
const readFileSmart = (file) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = () => {
    const buf = reader.result;
    let text = new TextDecoder('utf-8').decode(buf);
    // Mojibake detection — broken cyrillic looks like Ð Ñ Â or has replacement chars
    const sample = text.slice(0, 1000);
    if (text.includes('\uFFFD') || (/[\u00C0-\u00FF]{3,}/.test(sample) && !/[а-яА-Я]/.test(sample))) {
      try { text = new TextDecoder('windows-1251').decode(buf); } catch (e) {}
    }
    resolve(text);
  };
  reader.onerror = reject;
  reader.readAsArrayBuffer(file);
});

const parseAmount = (s) => {
  if (s == null || s === '') return NaN;
  let c = String(s).replace(/\s/g, '').replace(/\u00A0/g, '').replace(/[^\d,.\-]/g, '');
  // if both comma and dot, assume dot is thousand sep
  if (c.includes(',') && c.includes('.')) c = c.replace(/\./g, '').replace(',', '.');
  else c = c.replace(',', '.');
  const n = parseFloat(c);
  return isNaN(n) ? NaN : n;
};

// Russian month-name prefixes (родительный и именительный падежи)
const RU_MONTHS = [
  ['янв', '01'], ['фев', '02'], ['мар', '03'], ['апр', '04'],
  ['мая', '05'], ['май', '05'],
  ['июн', '06'], ['июл', '07'], ['авг', '08'],
  ['сен', '09'], ['окт', '10'], ['ноя', '11'], ['дек', '12'],
];

const parseStatementDate = (s) => {
  if (s == null) return null;
  s = String(s).trim().toLowerCase();
  if (!s) return null;
  // ДД месяц(ru) ГГГГ — напр. "01 мая 2026, 13:59" или "1 мая 2026"
  let m = s.match(/(\d{1,2})\s+([а-яё]+)\s+(\d{4})/);
  if (m) {
    const d = m[1].padStart(2, '0');
    const monName = m[2];
    const found = RU_MONTHS.find(([prefix]) => monName.startsWith(prefix));
    if (found) return `${m[3]}-${found[1]}-${d}`;
  }
  // ДД.ММ.ГГГГ / ДД/ММ/ГГГГ / ДД-ММ-ГГГГ
  m = s.match(/(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{2,4})/);
  if (m) {
    let [, d, mo, y] = m;
    if (y.length === 2) y = '20' + y;
    return `${y}-${mo.padStart(2, '0')}-${d.padStart(2, '0')}`;
  }
  // ISO ГГГГ-ММ-ДД
  m = s.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (m) return `${m[1]}-${m[2]}-${m[3]}`;
  return null;
};

// Guess which columns are date / amount / description / category / tx-type
const guessColumnMapping = (rows) => {
  const map = { date: -1, amount: -1, desc: -1, cat: -1, txType: -1 };
  if (!rows || !rows.length) return map;
  const header = rows[0].map((h) => String(h || '').toLowerCase());
  // Pass 1: prefer "сумма в рублях" / "сумма в руб" над plain "сумма"
  header.forEach((h, i) => {
    if (map.amount < 0 && /сумма.*руб/.test(h)) map.amount = i;
  });
  // Pass 2: основной проход
  header.forEach((h, i) => {
    if (map.date < 0 && /дата|date/.test(h)) map.date = i;
    if (map.amount < 0 && /сумма|amount|оборот/.test(h)) map.amount = i;
    if (map.txType < 0 && /тип.*операц|operation.*type|^тип$/.test(h)) map.txType = i;
    if (map.cat < 0 && /категор|category/.test(h)) map.cat = i;
    if (map.desc < 0 && /описан|назначен|получател|контрагент|description|комментар|memo/.test(h)) map.desc = i;
  });
  // Pass 3: fallback — "операция" как описание, если это не "тип операции"
  header.forEach((h, i) => {
    if (map.desc < 0 && /операц/.test(h) && !/тип/.test(h)) map.desc = i;
  });
  return map;
};

function Dashboard({ data, prevData, settings, ym, accent }) {
  const pieColors = useMemo(() => buildPieColors(accent), [accent]);
  const totalExpense = useMemo(() => data.expenses.reduce((s, e) => s + (+e.amount || 0), 0), [data.expenses]);
  const totalIncome = useMemo(() => data.income.reduce((s, e) => s + (+e.amount || 0), 0), [data.income]);
  const balance = totalIncome - totalExpense;
  const totalBudget = useMemo(() => settings.categories.reduce((s, c) => s + (+c.budget || 0), 0), [settings.categories]);
  const prevExpense = useMemo(() => (prevData?.expenses || []).reduce((s, e) => s + (+e.amount || 0), 0), [prevData]);
  const prevIncome = useMemo(() => (prevData?.income || []).reduce((s, e) => s + (+e.amount || 0), 0), [prevData]);
  const prevBalance = prevIncome - prevExpense;
  const delta = (cur, prev) => prev ? (cur - prev) / Math.abs(prev) : null;

  const byCategory = useMemo(() => settings.categories.map((c) => {
    const spent = data.expenses.filter((e) => e.category === c.name).reduce((s, e) => s + (+e.amount || 0), 0);
    return { name: c.name, spent, budget: c.budget, pct: c.budget ? spent / c.budget : 0 };
  }).sort((a, b) => b.spent - a.spent), [data.expenses, settings.categories]);

  const habitProgress = useMemo(() => {
    const days = daysInMonth(ym);
    const total = data.habits.length * days;
    if (!total) return 0;
    let done = 0;
    data.habits.forEach((h) => {
      for (let d = 1; d <= days; d++) if (data.habitChecks[`${h.id}-${d}`]) done++;
    });
    return done / total;
  }, [data.habits, data.habitChecks, ym]);

  const goalsDone = data.goals.filter((g) => g.status === 'Готово').length;
  const goalsTotal = data.goals.length;
  const pieData = byCategory.filter((c) => c.spent > 0).slice(0, 8);

  return (
    <div className="space-y-8">
      <div className="grid grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-4">
        <KpiCard label="Доход" value={fmtMoney(totalIncome)} accent="text-emerald-700" delta={delta(totalIncome, prevIncome)} sublabel="к прошл. месяцу" delay={0} />
        <KpiCard label="Расход" value={fmtMoney(totalExpense)} accent="text-rose-700" delta={delta(totalExpense, prevExpense)} sublabel="к прошл. месяцу" delay={60} />
        <KpiCard label="Баланс" value={fmtMoney(balance)} delta={delta(balance, prevBalance)} sublabel="к прошл. месяцу" delay={120} />
        <KpiCard label="Бюджет" value={fmtMoney(totalBudget - totalExpense)} sublabel={`из ${fmtMoney(totalBudget)}`} delay={180} />
        <KpiCard label="Цели" value={`${goalsDone}/${goalsTotal || 0}`} sublabel="выполнено" delay={240} />
        <KpiCard label="Привычки" value={fmtPct(habitProgress)} sublabel="среднее" delay={300} />
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <Card delay={360}>
          <SectionTitle delay={360}>Структура расходов</SectionTitle>
          {pieData.length === 0 ? (
            <div className="text-sm text-neutral-400 py-12 text-center">Нет данных</div>
          ) : (
            <ResponsiveContainer width="100%" height={260}>
              <PieChart>
                <Pie data={pieData} dataKey="spent" nameKey="name" cx="50%" cy="50%" outerRadius={90} innerRadius={50} paddingAngle={1} animationDuration={800}>
                  {pieData.map((_, i) => <Cell key={i} fill={pieColors[i % pieColors.length]} />)}
                </Pie>
                <Tooltip formatter={(v) => fmtMoney(v)} contentStyle={TOOLTIP_STYLE} />
              </PieChart>
            </ResponsiveContainer>
          )}
        </Card>

        <Card delay={420}>
          <SectionTitle delay={420}>Топ категорий</SectionTitle>
          <div className="space-y-3">
            {byCategory.slice(0, 6).map((c, i) => (
              <div key={c.name} className="animate-fade-up" style={{ animationDelay: `${480 + i * 50}ms` }}>
                <div className="flex items-center justify-between text-sm mb-1.5">
                  <span className="text-neutral-700">{c.name}</span>
                  <span className="font-mono text-neutral-900 tabular-nums">{fmtMoney(c.spent)}</span>
                </div>
                <div className="h-1 bg-neutral-100 rounded-full overflow-hidden">
                  <div
                    className="h-full rounded-full transition-all duration-700"
                    style={{
                      width: `${Math.min(c.pct, 1) * 100}%`,
                      background: c.pct > 1 ? '#9F1239' : c.pct > 0.8 ? '#A16207' : accent,
                    }}
                  />
                </div>
              </div>
            ))}
          </div>
        </Card>
      </div>

      {prevData && (totalExpense > 0 || prevExpense > 0) && (
        <Card delay={600}>
          <SectionTitle delay={600}>Сравнение с прошлым месяцем</SectionTitle>
          <ResponsiveContainer width="100%" height={240}>
            <BarChart data={[
              { name: 'Доход', current: totalIncome, prev: prevIncome },
              { name: 'Расход', current: totalExpense, prev: prevExpense },
              { name: 'Баланс', current: balance, prev: prevBalance },
            ]} barCategoryGap="30%">
              <CartesianGrid strokeDasharray="0" stroke="#F0F0F0" vertical={false} />
              <XAxis dataKey="name" tick={{ fontSize: 11, fill: '#6B6B6B' }} axisLine={false} tickLine={false} />
              <YAxis tick={{ fontSize: 11, fill: '#6B6B6B' }} axisLine={false} tickLine={false} tickFormatter={(v) => `${Math.round(v / 1000)}к`} />
              <Tooltip formatter={(v) => fmtMoney(v)} contentStyle={TOOLTIP_STYLE} />
              <Legend wrapperStyle={{ fontSize: 12 }} formatter={(v) => v === 'current' ? ymLabel(ym) : ymLabel(shiftYM(ym, -1))} />
              <Bar dataKey="prev" fill="#D4D4D4" radius={[4, 4, 0, 0]} animationDuration={800} />
              <Bar dataKey="current" fill={accent} radius={[4, 4, 0, 0]} animationDuration={800} />
            </BarChart>
          </ResponsiveContainer>
        </Card>
      )}
    </div>
  );
}

function PlanDay({ data, update, ym, gcal }) {
  const days = daysInMonth(ym);
  const isCurrentMonth = ym === todayYM();
  const [activeDay, setActiveDay] = useState(isCurrentMonth ? todayDay() : 1);
  const [syncing, setSyncing] = useState(false);
  const scrollerRef = useRef(null);

  useEffect(() => {
    if (!scrollerRef.current) return;
    const btn = scrollerRef.current.querySelector(`[data-day="${activeDay}"]`);
    if (btn) btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }, [activeDay]);

  const tasks = data.dailyTasks[activeDay] || [];

  const addTask = () => {
    const t = { id: uid(), title: '', status: null, time: '', note: '' };
    update((d) => ({ ...d, dailyTasks: { ...d.dailyTasks, [activeDay]: [...(d.dailyTasks[activeDay] || []), t] } }));
    focusLast('[data-input="day-task"]');
  };
  const updateTask = (id, patch) => {
    update((d) => ({ ...d, dailyTasks: { ...d.dailyTasks, [activeDay]: (d.dailyTasks[activeDay] || []).map((t) => t.id === id ? { ...t, ...patch } : t) } }));
  };
  const removeTask = (id) => {
    update((d) => ({ ...d, dailyTasks: { ...d.dailyTasks, [activeDay]: (d.dailyTasks[activeDay] || []).filter((t) => t.id !== id) } }));
  };

  const importFromGoogle = async () => {
    if (!gcal?.token) return;
    setSyncing(true);
    try {
      const events = await gcalFetchEvents(gcal.token.token, ym, activeDay);
      const existing = data.dailyTasks[activeDay] || [];
      const existingIds = new Set(existing.map((t) => t.googleEventId).filter(Boolean));
      const newTasks = events.filter((ev) => !existingIds.has(ev.id)).map(eventToTask);
      if (newTasks.length === 0) {
        alert('Все события уже импортированы');
      } else {
        update((d) => ({ ...d, dailyTasks: { ...d.dailyTasks, [activeDay]: [...existing, ...newTasks] } }));
      }
    } catch (e) {
      alert('Ошибка импорта: ' + e.message);
    }
    setSyncing(false);
  };

  const pushToGoogle = async (taskId) => {
    if (!gcal?.token) return;
    const task = (data.dailyTasks[activeDay] || []).find((t) => t.id === taskId);
    if (!task || !task.title) { alert('Сначала заполни название'); return; }
    if (task.googleEventId) { alert('Задача уже в календаре'); return; }
    try {
      const ev = await gcalCreateEvent(gcal.token.token, task, ym, activeDay);
      update((d) => ({
        ...d,
        dailyTasks: {
          ...d.dailyTasks,
          [activeDay]: (d.dailyTasks[activeDay] || []).map((t) => t.id === taskId ? { ...t, googleEventId: ev.id } : t),
        },
      }));
    } catch (e) {
      alert('Ошибка отправки: ' + e.message);
    }
  };

  return (
    <div className="space-y-6">
      <div className="overflow-x-auto -mx-4 sm:mx-0 hide-scroll" ref={scrollerRef}>
        <div className="flex gap-1.5 px-4 sm:px-0 pb-1">
          {Array.from({ length: days }, (_, i) => i + 1).map((d) => {
            const dow = dowOfDay(ym, d);
            const isWeekend = dow >= 5;
            const isToday = isCurrentMonth && d === todayDay();
            const isActive = d === activeDay;
            const hasTasks = (data.dailyTasks[d] || []).length > 0;
            return (
              <button
                key={d} data-day={d}
                onClick={() => setActiveDay(d)}
                className={`flex-shrink-0 w-12 h-16 rounded-xl border flex flex-col items-center justify-center gap-0.5 transition-all duration-200 ${
                  isActive ? 'bg-accent border-accent text-white shadow-md scale-105' : 'bg-white border-line text-neutral-700 hover:border-neutral-400'
                }`}
              >
                <span className={`text-[10px] font-medium ${isActive ? 'text-white/70' : isWeekend ? 'text-neutral-500 italic' : 'text-neutral-400'}`}>
                  {DOW_SHORT[dow]}
                </span>
                <span className="text-lg font-display font-light tabular-nums">{d}</span>
                {hasTasks && <span className={`w-1 h-1 rounded-full ${isActive ? 'bg-white' : 'bg-accent'}`} />}
                {isToday && !isActive && <span className="absolute mt-12 w-1 h-1 rounded-full bg-accent" />}
              </button>
            );
          })}
        </div>
      </div>

      <Card>
        <div className="flex items-center justify-between mb-5">
          <div>
            <div className="text-[10px] font-semibold tracking-[0.18em] text-neutral-500 uppercase">
              {DOW_LONG[dowOfDay(ym, activeDay)]}
            </div>
            <div className="text-3xl font-display font-light mt-1 flex items-baseline gap-2">
              <span className="font-display-italic">{activeDay}</span>
              <span className="text-neutral-400">{MONTHS_RU[parseYM(ym)[1] - 1].toLowerCase()}</span>
            </div>
          </div>
          <div className="flex items-center gap-2">
            {gcal?.token && (
              <button
                onClick={importFromGoogle}
                disabled={syncing}
                className="inline-flex items-center gap-1.5 px-3 py-2 rounded-lg border border-line text-neutral-700 text-sm font-medium hover:border-accent hover:text-accent transition-colors disabled:opacity-50"
                title="Импортировать события из Google Calendar"
              >
                {syncing ? <Icon name="loader" className="w-4 h-4 animate-spin-slow" /> : <Icon name="calendar" className="w-4 h-4" />}
                Из Google
              </button>
            )}
            <button onClick={addTask} className="inline-flex items-center gap-1.5 px-3 py-2 rounded-lg bg-accent text-white text-sm font-medium hover:opacity-90 transition-opacity">
              <Icon name="plus" className="w-4 h-4" /> Задача
            </button>
          </div>
        </div>

        {tasks.length === 0 ? (
          <div className="text-center py-12 text-neutral-400 text-sm">Пусто. Нажми «Задача» чтобы добавить.</div>
        ) : (
          <div className="space-y-2">
            {tasks.map((t, i) => (
              <div key={t.id} className="group flex items-start gap-2 sm:gap-3 p-3 rounded-xl border border-line hover:border-neutral-300 transition-colors animate-fade-up" style={{ animationDelay: `${i * 40}ms` }}>
                <input
                  type="text"
                  value={t.title}
                  onChange={(e) => updateTask(t.id, { title: e.target.value })}
                  onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); addTask(); } }}
                  data-input="day-task"
                  placeholder="Что нужно сделать"
                  className="flex-1 bg-transparent text-sm outline-none placeholder:text-neutral-300 min-w-0"
                />
                <input type="text" value={t.time} onChange={(e) => updateTask(t.id, { time: e.target.value })} placeholder="время" className="w-16 bg-transparent text-xs text-neutral-500 outline-none text-center" />
                <Pill value={t.status} options={STATUSES} onChange={(v) => updateTask(t.id, { status: v })} />
                {gcal?.token && (
                  t.googleEventId ? (
                    <span className="text-[10px] font-bold tracking-wider text-emerald-700 px-1.5 py-1 rounded bg-emerald-50" title="В Google Calendar">G</span>
                  ) : (
                    <IconBtn onClick={() => pushToGoogle(t.id)} title="Отправить в Google Calendar">
                      <Icon name="calendar" className="w-4 h-4" />
                    </IconBtn>
                  )
                )}
                <IconBtn onClick={() => removeTask(t.id)} title="Удалить" danger>
                  <Icon name="x" className="w-4 h-4" />
                </IconBtn>
              </div>
            ))}
          </div>
        )}
      </Card>
    </div>
  );
}

function PlanWeek({ data, update }) {
  const addTask = (week) => {
    const t = { id: uid(), category: '', title: '', deadline: '', status: null, note: '' };
    update((d) => ({ ...d, weeklyTasks: { ...d.weeklyTasks, [week]: [...(d.weeklyTasks[week] || []), t] } }));

    update((d) => ({ ...d, weeklyTasks: { ...d.weeklyTasks, [week]: (d.weeklyTasks[week] || []).map((t) => t.id === id ? { ...t, ...patch } : t) } }));

    update((d) => ({ ...d, weeklyTasks: { ...d.weeklyTasks, [week]: (d.weeklyTasks[week] || []).filter((t) => t.id !== id) } }));

  return (
    <div className="space-y-6">

              <div className="space-y-2">

function Habits({ data, update, ym }) {
  const days = daysInMonth(ym);
  const dayArr = Array.from({ length: days }, (_, i) => i + 1);

  const toggle = (habitId, day) => {
    const key = `${habitId}-${day}`;
    update((d) => ({ ...d, habitChecks: { ...d.habitChecks, [key]: !d.habitChecks[key] } }));
  };
  const addHabit = () => {
    update((d) => ({ ...d, habits: [...d.habits, { id: uid(), name: '' }] }));
    focusLast('[data-input="habit-name"]');
  };
  const updateHabit = (id, name) => update((d) => ({ ...d, habits: d.habits.map((h) => h.id === id ? { ...h, name } : h) }));
  const removeHabit = (id) => update((d) => {
    const checks = { ...d.habitChecks };
    Object.keys(checks).forEach((k) => { if (k.startsWith(id + '-')) delete checks[k]; });
    return { ...d, habits: d.habits.filter((h) => h.id !== id), habitChecks: checks };
  });

  const habitStats = (habit) => {
    let done = 0;
    for (let d = 1; d <= days; d++) if (data.habitChecks[`${habit.id}-${d}`]) done++;
    return { done, pct: done / days };
  };

  return (
    <div className="space-y-6">
      <Card>
        <div className="flex items-center justify-between mb-5">
          <SectionTitle>Трекер</SectionTitle>
          <button onClick={addHabit} className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-accent text-white text-xs font-medium hover:opacity-90 transition-opacity">
            <Icon name="plus" className="w-3.5 h-3.5" /> Привычка
          </button>
        </div>

        {data.habits.length === 0 ? (
          <div className="text-center py-12 text-neutral-400 text-sm">Нет привычек</div>
        ) : (
          <div className="overflow-x-auto -mx-6 px-6 hide-scroll">
            <div className="min-w-fit">
              <div className="flex items-center gap-1 mb-2">
                <div className="w-40 flex-shrink-0 text-[10px] font-semibold tracking-[0.14em] text-neutral-500 uppercase pr-3">Привычка</div>
                {dayArr.map((d) => {
                  const dow = dowOfDay(ym, d);
                  return (
                    <div key={d} className={`w-6 h-6 flex flex-col items-center justify-center text-[10px] font-medium ${dow >= 5 ? 'text-amber-600' : 'text-neutral-400'}`}>
                      {d}
                    </div>
                  );
                })}
                <div className="w-12 flex-shrink-0 text-center text-[10px] font-semibold tracking-[0.14em] text-neutral-500 uppercase pl-2">%</div>
              </div>

              {data.habits.map((h, hi) => {
                const stats = habitStats(h);
                return (
                  <div key={h.id} className="flex items-center gap-1 py-1 group animate-fade-up" style={{ animationDelay: `${hi * 50}ms` }}>
                    <div className="w-40 flex-shrink-0 flex items-center gap-1 pr-3">
                      <input
                        type="text"
                        value={h.name}
                        onChange={(e) => updateHabit(h.id, e.target.value)}
                        onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); addHabit(); } }}
                        data-input="habit-name"
                        placeholder="Привычка"
                        className="flex-1 bg-transparent text-sm outline-none placeholder:text-neutral-300 min-w-0"
                      />
                      <IconBtn onClick={() => removeHabit(h.id)} title="Удалить" danger>
                        <Icon name="x" className="w-3.5 h-3.5" />
                      </IconBtn>
                    </div>
                    {dayArr.map((d) => {
                      const on = !!data.habitChecks[`${h.id}-${d}`];
                      return (
                        <button
                          key={d} onClick={() => toggle(h.id, d)}
                          className={`w-6 h-6 rounded-md border transition-all duration-150 ${
                            on ? 'bg-accent border-accent' : 'bg-white border-line hover:border-accent/40 hover:bg-accent-bg'
                          }`}
                        />
                      );
                    })}
                    <div className="w-12 flex-shrink-0 text-center text-xs font-mono text-neutral-700 tabular-nums pl-2">
                      {Math.round(stats.pct * 100)}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </Card>
    </div>
  );
}

// ───────────────────────────────────────────────────────────
// Чек-листы
// ───────────────────────────────────────────────────────────
function Checklists({ checklists, updateChecklists }) {
  const toggleItem = (listId, itemIdx) => {
    updateChecklists((cs) => cs.map((l) => {
      if (l.id !== listId) return l;
      return { ...l, items: l.items.map((it, i) => i === itemIdx ? { ...it, done: !it.done } : it) };
    }));
  };
  const resetList = (listId) => {
    updateChecklists((cs) => cs.map((l) => {
      if (l.id !== listId) return l;
      return { ...l, items: l.items.map((it) => ({ ...it, done: false })) };
    }));
  };
  const addList = () => updateChecklists((cs) => [...cs, { id: uid(), name: 'Новый список', items: [] }]);
  const renameList = (id, name) => updateChecklists((cs) => cs.map((l) => l.id === id ? { ...l, name } : l));
  const removeList = (id) => updateChecklists((cs) => cs.filter((l) => l.id !== id));
  const addItem = (listId) => {
    updateChecklists((cs) => cs.map((l) => l.id === listId ? { ...l, items: [...l.items, { text: '', done: false }] } : l));
    focusLast(`[data-input="list-item-${listId}"]`);
  };
  const updateItemText = (listId, idx, text) => updateChecklists((cs) => cs.map((l) => {
    if (l.id !== listId) return l;
    return { ...l, items: l.items.map((it, i) => i === idx ? { ...it, text } : it) };
  }));
  const removeItem = (listId, idx) => updateChecklists((cs) => cs.map((l) => {
    if (l.id !== listId) return l;
    return { ...l, items: l.items.filter((_, i) => i !== idx) };
  }));

  return (
    <div className="space-y-6">
      <div className="flex justify-end">
        <button onClick={addList} className="inline-flex items-center gap-1.5 px-3 py-2 rounded-lg bg-accent text-white text-sm font-medium hover:opacity-90 transition-opacity">
          <Icon name="plus" className="w-4 h-4" /> Список
        </button>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        {checklists.map((list, li) => {
          const total = list.items.length;
          const done = list.items.filter((it) => it.done).length;
          return (
            <Card key={list.id} delay={li * 80}>
              <div className="flex items-start justify-between mb-4">
                <div className="flex-1 min-w-0">
                  <input type="text" value={list.name} onChange={(e) => renameList(list.id, e.target.value)} className="bg-transparent text-lg font-display font-light outline-none w-full" />
                  <div className="text-[10px] tracking-[0.14em] text-neutral-400 uppercase mt-0.5 font-mono">{done} / {total}</div>
                </div>
                <div className="flex">
                  <IconBtn onClick={() => resetList(list.id)} title="Сброс всех галочек">
                    <Icon name="repeat" className="w-4 h-4" />
                  </IconBtn>
                  <IconBtn onClick={() => removeList(list.id)} title="Удалить" danger>
                    <Icon name="trash" className="w-4 h-4" />
                  </IconBtn>
                </div>
              </div>
              <div className="space-y-1">
                {list.items.map((item, i) => {
                  const on = !!item.done;
                  return (
                    <div key={i} className="group flex items-center gap-2 py-1">
                      <button onClick={() => toggleItem(list.id, i)} className={`w-5 h-5 rounded-md border flex items-center justify-center flex-shrink-0 transition-all ${on ? 'bg-emerald-600 border-emerald-600' : 'bg-white border-neutral-300 hover:border-neutral-500'}`}>
                        {on && <Icon name="check" className="w-3.5 h-3.5 text-white" strokeWidth={3} />}
                      </button>
                      <input
                        type="text"
                        value={item.text}
                        onChange={(e) => updateItemText(list.id, i, e.target.value)}
                        onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); addItem(list.id); } }}
                        data-input={`list-item-${list.id}`}
                        className={`flex-1 bg-transparent text-sm outline-none transition-all ${on ? 'line-through text-neutral-400' : 'text-neutral-700'}`}
                      />
                      <button onClick={() => removeItem(list.id, i)} className="opacity-0 group-hover:opacity-100 text-neutral-300 hover:text-rose-500 transition-opacity">
                        <Icon name="x" className="w-3.5 h-3.5" />
                      </button>
                    </div>
                  );
                })}
                <button onClick={() => addItem(list.id)} className="text-xs text-neutral-400 hover:text-neutral-700 mt-2 inline-flex items-center gap-1 transition-colors">
                  <Icon name="plus" className="w-3 h-3" /> пункт
                </button>
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}

// ───────────────────────────────────────────────────────────
// Импорт банковской выписки (CSV)
// ───────────────────────────────────────────────────────────
function StatementImport({ ym, data, update, categories }) {
  const [open, setOpen] = useState(false);
  const [rows, setRows] = useState(null);
  const [fileName, setFileName] = useState('');
  const [hasHeader, setHasHeader] = useState(true);
  const [map, setMap] = useState({ date: -1, amount: -1, desc: -1, cat: -1, txType: -1 });
  const [onlyNeg, setOnlyNeg] = useState(true);
  const [replaceAll, setReplaceAll] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState('');

  const reset = () => {
    setRows(null); setFileName(''); setMap({ date: -1, amount: -1, desc: -1, cat: -1, txType: -1 });
    setReplaceAll(false);
    setResult(null); setError('');
  };

  const handleFile = async (file) => {
    if (!file) return;
    setError(''); setResult(null);
    try {
      const text = await readFileSmart(file);
      const parsed = Papa.parse(text.trim(), { skipEmptyLines: true });
      if (!parsed.data || parsed.data.length < 2) {
        setError('Файл пустой или не похож на таблицу'); return;
      }
      setRows(parsed.data);
      setFileName(file.name);
      setMap(guessColumnMapping(parsed.data));
    } catch (e) {
      setError('Не удалось прочитать файл: ' + e.message);
    }
  };

  const colCount = rows ? Math.max(...rows.slice(0, 10).map((r) => r.length)) : 0;
  const colOptions = Array.from({ length: colCount }, (_, i) => i);
  const colLabel = (i) => {
    if (i < 0) return '—';
    if (hasHeader && rows && rows[0][i]) return String(rows[0][i]).slice(0, 24);
    return `Столбец ${i + 1}`;
  };

  const parsedTx = useMemo(() => {
    if (!rows || map.date < 0 || map.amount < 0) return [];
    const dataRows = hasHeader ? rows.slice(1) : rows;
    const out = [];
    dataRows.forEach((r) => {
      const date = parseStatementDate(r[map.date]);
      const amount = parseAmount(r[map.amount]);
      if (!date || isNaN(amount)) return;
      // Фильтр "Только расходы": если есть колонка "Тип операции" — берём её,
      // иначе fallback на знак суммы (отрицательные = расход)
      if (onlyNeg) {
        if (map.txType >= 0) {
          const t = String(r[map.txType] || '').toLowerCase();
          if (!/расход|списан|expense|debit/.test(t)) return;
        } else if (amount >= 0) {
          return;
        }
      }
      out.push({
        date,
        amount: Math.abs(amount),
        description: (map.desc >= 0 ? String(r[map.desc] || '') : '').trim(),
        category: (map.cat >= 0 ? String(r[map.cat] || '') : '').trim(),
      });
    });
    return out;
  }, [rows, hasHeader, map, onlyNeg]);

  const totalSum = parsedTx.reduce((s, t) => s + t.amount, 0);

  const doImport = async () => {
    if (parsedTx.length === 0) return;
    const sameTx = (a, b) => a.day === b.day && Math.round(a.amount) === Math.round(b.amount) && a.description === b.description;

    let imported = 0, skipped = 0, cleared = 0;

    // При replaceAll сначала чистим expenses во ВСЕХ месяцах (текущий и все остальные в storage)
    if (replaceAll) {
      cleared += (data.expenses || []).length;
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!k || !k.startsWith('planner:month:')) continue;
        const monthKey = k.slice('planner:month:'.length);
        if (monthKey === ym) continue; // текущий обновится через setData ниже
        try {
          const md = JSON.parse(localStorage.getItem(k));
          if (md && Array.isArray(md.expenses) && md.expenses.length) {
            cleared += md.expenses.length;
            md.expenses = [];
            localStorage.setItem(k, JSON.stringify(md));
          }
        } catch {}
      }
    }

    const byMonth = {};
    parsedTx.forEach((t) => {
      const m = t.date.slice(0, 7);
      (byMonth[m] = byMonth[m] || []).push(t);
    });

    const monthsAffected = Object.keys(byMonth);

    for (const m of monthsAffected) {
      const toExpenses = byMonth[m].map((t) => ({
        id: uid(),
        day: +t.date.slice(8, 10),
        category: t.category || 'Прочее',
        amount: t.amount,
        description: t.description,
        method: 'Карта',
      }));

      if (m === ym) {
        const existing = replaceAll ? [] : data.expenses;
        const fresh = toExpenses.filter((ne) => !existing.some((e) => sameTx(e, ne)));
        skipped += toExpenses.length - fresh.length;
        imported += fresh.length;
        update((d) => ({ ...d, expenses: [...fresh, ...(replaceAll ? [] : d.expenses)] }));
      } else {
        // expenses этого месяца уже очищены выше при replaceAll
        const md = (await storage.get(`month:${m}`)) || emptyMonth();
        const existing = md.expenses || [];
        const fresh = toExpenses.filter((ne) => !existing.some((e) => sameTx(e, ne)));
        skipped += toExpenses.length - fresh.length;
        imported += fresh.length;
        md.expenses = [...fresh, ...existing];
        await storage.set(`month:${m}`, md);
      }
    }

    setResult({ imported, skipped, cleared, months: monthsAffected.length });
    setRows(null); setFileName('');
  };

  return (
    <Card delay={210}>
      <button
        onClick={() => { setOpen((o) => !o); if (open) reset(); }}
        className="w-full flex items-center justify-between text-left"
      >
        <SectionTitle>Импорт выписки (CSV)</SectionTitle>
        <Icon name={open ? 'chevron-left' : 'chevron-right'} className="w-4 h-4 text-neutral-400" />
      </button>

      {open && (
        <div className="mt-2 animate-fade-up">
          {result ? (
            <div className="py-6 text-center">
              <div className="text-3xl font-display font-light text-neutral-900 mb-1">{result.imported}</div>
              <div className="text-sm text-neutral-600">
                импортировано {result.months > 1 ? `в ${result.months} мес.` : ''}
                {result.skipped > 0 && <span className="text-neutral-400"> · {result.skipped} дублей пропущено</span>}
                {result.cleared > 0 && <span className="text-rose-600"> · {result.cleared} удалено</span>}
              </div>
              <button onClick={reset} className="mt-4 text-xs text-accent hover:underline">Импортировать ещё</button>
            </div>
          ) : !rows ? (
            <div className="py-4">

                  <tbody>
                    {rows.slice(0, 4).map((r, ri) => (
                      <tr key={ri} className={ri === 0 && hasHeader ? 'bg-neutral-50 font-medium' : ''}>
                        {colOptions.map((ci) => (
                          <td key={ci} className="px-2 py-1.5 border-r border-line-soft whitespace-nowrap text-neutral-600 max-w-[160px] truncate">
                            {String(r[ci] ?? '')}

                Первая строка — заголовки
              </label>

              {/* Column mapping */}
              <div className="grid grid-cols-2 sm:grid-cols-5 gap-2">
                {[
                  { key: 'date', label: 'Дата *' },
                  { key: 'amount', label: 'Сумма *' },
                  { key: 'desc', label: 'Описание' },
                  { key: 'cat', label: 'Категория' },
                  { key: 'txType', label: 'Тип операции' },

                  <div key={f.key}>
                    <div className="text-[10px] font-semibold tracking-wider text-neutral-500 uppercase mb-1">{f.label}</div>

                      value={map[f.key]}
                      onChange={(e) => setMap((m) => ({ ...m, [f.key]: +e.target.value }))}
                      className="w-full px-2 py-1.5 rounded-lg border border-line text-xs bg-white outline-none focus:border-accent"
                    >
                      <option value={-1}>—</option>
                      {colOptions.map((ci) => <option key={ci} value={ci}>{colLabel(ci)}</option>)}
                    </select>
                  </div>
                ))}

              <label className="flex items-center gap-2 text-xs text-neutral-600 cursor-pointer">
                <input type="checkbox" checked={onlyNeg} onChange={(e) => setOnlyNeg(e.target.checked)} className="accent-current" />
                Только расходы {map.txType >= 0 ? '(по колонке «Тип операции»)' : '(отрицательные суммы)'}
              </label>

              <label className="flex items-center gap-2 text-xs text-rose-700 cursor-pointer">
                <input type="checkbox" checked={replaceAll} onChange={(e) => setReplaceAll(e.target.checked)} className="accent-current" />
                Удалить все существующие расходы (во всех месяцах) перед импортом
              </label>

              {map.date < 0 || map.amount < 0 ? (
                <p className="text-xs text-amber-700">Укажи столбцы «Дата» и «Сумма» — они обязательны.</p>
              ) : (
                <div className="text-xs text-neutral-600">
                  Распознано <span className="font-semibold text-neutral-900">{parsedTx.length}</span> транзакций

                  Отмена
                </button>
              </div>
            </div>
          )}
        </div>
      )}
    </Card>
  );
}

function Expenses({ data, update, settings, ym }) {
  const [form, setForm] = useState({ day: todayYM() === ym ? todayDay() : 1, category: '', amount: '', description: '', method: 'Карта' });

  // Reset day when month changes — pick today if current month, else 1st
  useEffect(() => {
    setForm((f) => ({ ...f, day: todayYM() === ym ? todayDay() : 1 }));
  }, [ym]);

  const total = data.expenses.reduce((s, e) => s + (+e.amount || 0), 0);
  const count = data.expenses.length;
  const avg = count ? total / count : 0;

  const addExpense = () => {
    if (!form.amount || !form.category) return;
    const e = { id: uid(), day: +form.day, category: form.category, amount: +form.amount, description: form.description, method: form.method };
    update((d) => ({ ...d, expenses: [e, ...d.expenses] }));
    setForm({ ...form, amount: '', description: '' });
    focusLast('[data-input="expense-amount"]');
  };
  const removeExpense = (id) => update((d) => ({ ...d, expenses: d.expenses.filter((e) => e.id !== id) }));

  const days = daysInMonth(ym);
  const formDateStr = `${ym}-${String(form.day).padStart(2, '0')}`;
  const monthMin = `${ym}-01`;
  const monthMax = `${ym}-${String(days).padStart(2, '0')}`;

  return (
    <div className="space-y-6">
      <div className="grid grid-cols-3 gap-3 sm:gap-4">
        <KpiCard label="Итого" value={fmtMoney(total)} accent="text-rose-700" delay={0} />
        <KpiCard label="Транзакций" value={count} delay={60} />
        <KpiCard label="Средний чек" value={fmtMoney(avg)} delay={120} />
      </div>

      <Card delay={180}>
        <SectionTitle delay={180}>Новая трата</SectionTitle>
        <div
          className="grid grid-cols-2 md:grid-cols-6 gap-2"
          onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); addExpense(); } }}
        >
          <input
            type="date"
            value={formDateStr}
            min={monthMin}
            max={monthMax}
            onChange={(e) => {
              const d = +e.target.value.slice(8);
              if (d >= 1 && d <= days) setForm({ ...form, day: d });
            }}
            className="px-3 py-2 rounded-lg border border-line text-sm bg-white outline-none focus:border-accent transition-colors col-span-2 md:col-span-1"
          />
          <select value={form.category} onChange={(e) => setForm({ ...form, category: e.target.value })} className="px-3 py-2 rounded-lg border border-line text-sm bg-white outline-none focus:border-accent transition-colors col-span-2">
            <option value="">Категория</option>
            {settings.categories.map((c) => <option key={c.id} value={c.name}>{c.name}</option>)}
          </select>
          <input type="number" inputMode="numeric" value={form.amount} onChange={(e) => setForm({ ...form, amount: e.target.value })} placeholder="Сумма ₽" data-input="expense-amount" className="px-3 py-2 rounded-lg border border-line text-sm bg-white outline-none focus:border-accent transition-colors" />
          <input type="text" value={form.description} onChange={(e) => setForm({ ...form, description: e.target.value })} placeholder="Описание" className="px-3 py-2 rounded-lg border border-line text-sm bg-white outline-none focus:border-accent transition-colors col-span-2 md:col-span-1" />
          <button onClick={addExpense} disabled={!form.amount || !form.category} className="px-3 py-2 rounded-lg bg-accent text-white text-sm font-medium hover:opacity-90 transition-opacity disabled:opacity-30 disabled:cursor-not-allowed col-span-2 md:col-span-1">
            Добавить
          </button>
        </div>
      </Card>

      <StatementImport ym={ym} data={data} update={update} categories={settings.categories} />

      <Card delay={240}>
        <SectionTitle delay={240}>История</SectionTitle>
        {data.expenses.length === 0 ? (
          <div className="text-center py-12 text-neutral-400 text-sm">Пока нет трат</div>
        ) : (
          <div className="space-y-1">
            {data.expenses.map((e, i) => {
              const dow = dowOfDay(ym, e.day);
              return (
                <div key={e.id} className="group flex items-center gap-2 sm:gap-3 py-2.5 border-b border-line-soft hover:bg-neutral-50 -mx-2 px-2 rounded-lg transition-colors animate-fade-up" style={{ animationDelay: `${Math.min(i * 20, 400)}ms` }}>
                  <div className="text-xs text-neutral-400 font-mono w-10 flex-shrink-0">
                    {String(e.day).padStart(2, '0')}<span className={dow >= 5 ? 'text-amber-600' : ''}>·{DOW_SHORT[dow]}</span>
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="text-sm text-neutral-900 truncate">{e.description || '—'}</div>
                    <div className="text-xs text-neutral-400">{e.category} · {e.method}</div>
                  </div>
                  <div className="font-mono text-sm font-semibold text-neutral-900 tabular-nums">{fmtMoney(e.amount)}</div>
                  <IconBtn onClick={() => removeExpense(e.id)} title="Удалить" danger>
                    <Icon name="x" className="w-4 h-4" />
                  </IconBtn>
                </div>
              );
            })}
          </div>
        )}
      </Card>
    </div>
  );
}

function Analytics({ data, history, settings, ym, accent }) {
  const pieColors = useMemo(() => buildPieColors(accent), [accent]);
  const days = daysInMonth(ym);
  const byDay = useMemo(() => Array.from({ length: days }, (_, i) => {
    const day = i + 1;
    const sum = data.expenses.filter((e) => e.day === day).reduce((s, e) => s + (+e.amount || 0), 0);
    return { day, sum };
  }), [data.expenses, days]);

  const byDow = useMemo(() => {
    const arr = DOW_LONG.map((n) => ({ name: n, sum: 0 }));
    data.expenses.forEach((e) => {
      const idx = dowOfDay(ym, e.day);
      arr[idx].sum += +e.amount || 0;
    });
    return arr;
  }, [data.expenses, ym]);

  const byMethod = useMemo(() => PAYMENT_METHODS.map((m) => ({
    name: m,
    sum: data.expenses.filter((e) => e.method === m).reduce((s, e) => s + (+e.amount || 0), 0),
  })).filter((m) => m.sum > 0), [data.expenses]);

  const byCategory = useMemo(() => settings.categories.map((c) => ({
    name: c.name,
    spent: data.expenses.filter((e) => e.category === c.name).reduce((s, e) => s + (+e.amount || 0), 0),
    budget: c.budget,
  })).filter((c) => c.spent > 0 || c.budget > 0).sort((a, b) => b.spent - a.spent), [data.expenses, settings.categories]);

  const byIncomeSource = useMemo(() => settings.incomeSources.map((s) => ({
    name: s.name,
    sum: data.income.filter((i) => i.source === s.name).reduce((acc, i) => acc + (+i.amount || 0), 0),
  })).filter((s) => s.sum > 0), [data.income, settings.incomeSources]);

  const trend = useMemo(() => history.map((h) => ({
    name: ymLabel(h.ym).split(' ')[0].slice(0, 3),
    income: h.income,
    expense: h.expense,
  })), [history]);

  return (
    <div className="space-y-4">
      {trend.length > 1 && (
        <Card>
          <SectionTitle>Тренд по месяцам</SectionTitle>
          <ResponsiveContainer width="100%" height={240}>
            <BarChart data={trend} barCategoryGap="20%">
              <CartesianGrid strokeDasharray="0" stroke="#F0F0F0" vertical={false} />
              <XAxis dataKey="name" tick={{ fontSize: 11, fill: '#6B6B6B' }} axisLine={false} tickLine={false} />
              <YAxis tick={{ fontSize: 11, fill: '#6B6B6B' }} axisLine={false} tickLine={false} tickFormatter={(v) => `${Math.round(v / 1000)}к`} />
              <Tooltip formatter={(v) => fmtMoney(v)} contentStyle={TOOLTIP_STYLE} />
              <Legend wrapperStyle={{ fontSize: 12 }} />
              <Bar dataKey="income" name="Доход" fill={accent} radius={[4, 4, 0, 0]} animationDuration={800} />
              <Bar dataKey="expense" name="Расход" fill="#1A1A1A" radius={[4, 4, 0, 0]} animationDuration={800} />
            </BarChart>
          </ResponsiveContainer>
        </Card>
      )}

      <Card delay={60}>
        <SectionTitle delay={60}>Динамика по дням</SectionTitle>
        <ResponsiveContainer width="100%" height={220}>
          <LineChart data={byDay}>
            <CartesianGrid strokeDasharray="0" stroke="#F0F0F0" vertical={false} />
            <XAxis dataKey="day" tick={{ fontSize: 11, fill: '#6B6B6B' }} axisLine={false} tickLine={false} />
            <YAxis tick={{ fontSize: 11, fill: '#6B6B6B' }} axisLine={false} tickLine={false} tickFormatter={(v) => `${Math.round(v / 1000)}к`} />
            <Tooltip formatter={(v) => fmtMoney(v)} contentStyle={TOOLTIP_STYLE} />
            <Line type="monotone" dataKey="sum" stroke={accent} strokeWidth={2.5} dot={{ fill: accent, r: 3 }} activeDot={{ r: 5, fill: accent }} animationDuration={1000} />
          </LineChart>
        </ResponsiveContainer>
      </Card>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <Card delay={120}>
          <SectionTitle delay={120}>По категориям</SectionTitle>
          <ResponsiveContainer width="100%" height={Math.max(220, byCategory.length * 28)}>
            <BarChart data={byCategory} layout="vertical" barCategoryGap="20%">
              <CartesianGrid strokeDasharray="0" stroke="#F0F0F0" horizontal={false} />
              <XAxis type="number" tick={{ fontSize: 11, fill: '#6B6B6B' }} axisLine={false} tickLine={false} tickFormatter={(v) => `${Math.round(v / 1000)}к`} />
              <YAxis type="category" dataKey="name" tick={{ fontSize: 11, fill: '#6B6B6B' }} axisLine={false} tickLine={false} width={110} />
              <Tooltip formatter={(v) => fmtMoney(v)} contentStyle={TOOLTIP_STYLE} />
              <Bar dataKey="spent" name="Факт" fill={accent} radius={[0, 4, 4, 0]} animationDuration={800} />
              <Bar dataKey="budget" name="Бюджет" fill="#D4D4D4" radius={[0, 4, 4, 0]} animationDuration={800} />
            </BarChart>
          </ResponsiveContainer>
        </Card>

        <Card delay={180}>
          <SectionTitle delay={180}>По дням недели</SectionTitle>
          <ResponsiveContainer width="100%" height={240}>
            <PieChart>
              <Pie data={byDow.filter((d) => d.sum > 0)} dataKey="sum" nameKey="name" cx="50%" cy="50%" outerRadius={90} innerRadius={50} paddingAngle={1} animationDuration={800}>
                {byDow.map((_, i) => <Cell key={i} fill={pieColors[i % pieColors.length]} />)}
              </Pie>
              <Tooltip formatter={(v) => fmtMoney(v)} contentStyle={TOOLTIP_STYLE} />
              <Legend wrapperStyle={{ fontSize: 11 }} />
            </PieChart>
          </ResponsiveContainer>
        </Card>

        <Card delay={240}>
          <SectionTitle delay={240}>Способы оплаты</SectionTitle>
          {byMethod.length === 0 ? (
            <div className="text-sm text-neutral-400 py-12 text-center">Нет данных</div>
          ) : (
            <ResponsiveContainer width="100%" height={240}>
              <PieChart>
                <Pie data={byMethod} dataKey="sum" nameKey="name" cx="50%" cy="50%" outerRadius={90} paddingAngle={1} animationDuration={800}>
                  {byMethod.map((_, i) => <Cell key={i} fill={pieColors[i % pieColors.length]} />)}
                </Pie>
                <Tooltip formatter={(v) => fmtMoney(v)} contentStyle={TOOLTIP_STYLE} />
                <Legend wrapperStyle={{ fontSize: 11 }} />
              </PieChart>
            </ResponsiveContainer>
          )}
        </Card>

        <Card delay={300}>
          <SectionTitle delay={300}>Источники дохода</SectionTitle>
          {byIncomeSource.length === 0 ? (
            <div className="text-sm text-neutral-400 py-12 text-center">Нет данных</div>
          ) : (
            <ResponsiveContainer width="100%" height={240}>
              <PieChart>
                <Pie data={byIncomeSource} dataKey="sum" nameKey="name" cx="50%" cy="50%" outerRadius={90} paddingAngle={1} animationDuration={800}>
                  {byIncomeSource.map((_, i) => <Cell key={i} fill={pieColors[i % pieColors.length]} />)}
                </Pie>
                <Tooltip formatter={(v) => fmtMoney(v)} contentStyle={TOOLTIP_STYLE} />
                <Legend wrapperStyle={{ fontSize: 11 }} />
              </PieChart>
            </ResponsiveContainer>
          )}
        </Card>
      </div>
    </div>
  );
}

// ───────────────────────────────────────────────────────────
// Обещания (глобальные, не привязаны к месяцу)
// ───────────────────────────────────────────────────────────
const PROMISE_STATUS = {
  ACTIVE: 'Активно',
  KEPT: 'Выполнено',
  BROKEN: 'Нарушено',
};
const PROMISE_STATUS_LIST = [PROMISE_STATUS.ACTIVE, PROMISE_STATUS.KEPT, PROMISE_STATUS.BROKEN];

const promiseStatusColor = (s) => {
  if (s === PROMISE_STATUS.KEPT) return 'text-emerald-700 bg-emerald-50 border-emerald-100';
  if (s === PROMISE_STATUS.BROKEN) return 'text-rose-700 bg-rose-50 border-rose-100';
  return 'text-neutral-600 bg-white border-neutral-300';
};

function Promises({ promises, updatePromises }) {
  const [filter, setFilter] = useState('all'); // all | active | kept | broken

  const addPromise = () => {
    const p = {
      id: uid(),
      title: '',
      to: '',
      deadline: '',
      status: PROMISE_STATUS.ACTIVE,
      note: '',
      createdAt: new Date().toISOString().slice(0, 10),
    };
    updatePromises((arr) => [p, ...arr]);
    focusLast('[data-input="promise-title"]');
  };
  const updateP = (id, patch) => updatePromises((arr) => arr.map((p) => p.id === id ? { ...p, ...patch } : p));
  const removeP = (id) => updatePromises((arr) => arr.filter((p) => p.id !== id));

  const today = new Date().toISOString().slice(0, 10);
  const isOverdue = (p) => p.status === PROMISE_STATUS.ACTIVE && p.deadline && p.deadline < today;

  const stats = useMemo(() => ({
    active: promises.filter((p) => p.status === PROMISE_STATUS.ACTIVE).length,
    kept: promises.filter((p) => p.status === PROMISE_STATUS.KEPT).length,
    broken: promises.filter((p) => p.status === PROMISE_STATUS.BROKEN).length,
    overdue: promises.filter(isOverdue).length,
  }), [promises]);

  const filtered = useMemo(() => {
    if (filter === 'active') return promises.filter((p) => p.status === PROMISE_STATUS.ACTIVE);
    if (filter === 'kept') return promises.filter((p) => p.status === PROMISE_STATUS.KEPT);
    if (filter === 'broken') return promises.filter((p) => p.status === PROMISE_STATUS.BROKEN);
    return promises;
  }, [promises, filter]);

  const filters = [
    { id: 'all', name: 'Все', count: promises.length },
    { id: 'active', name: 'Активные', count: stats.active },
    { id: 'kept', name: 'Выполнены', count: stats.kept },
    { id: 'broken', name: 'Нарушены', count: stats.broken },
  ];

  return (
    <div className="space-y-6">
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 sm:gap-4">
        <KpiCard label="Активные" value={stats.active} delay={0} />
        <KpiCard label="Выполнено" value={stats.kept} accent="text-emerald-700" delay={60} />
        <KpiCard label="Нарушено" value={stats.broken} accent="text-rose-700" delay={120} />
        <KpiCard label="Просрочено" value={stats.overdue} accent="text-amber-700" delay={180} />
      </div>

      <Card delay={240}>
        <div className="flex items-center justify-between mb-5 flex-wrap gap-3">
          <SectionTitle delay={240}>Обещания</SectionTitle>
          <button
            onClick={addPromise}
            className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-accent text-white text-xs font-medium hover:opacity-90 transition-opacity"
          >
            <Icon name="plus" className="w-3.5 h-3.5" /> Обещание
          </button>
        </div>

        <div className="flex flex-wrap gap-1 mb-5">
          {filters.map((f) => (
            <button
              key={f.id}
              onClick={() => setFilter(f.id)}
              className={`text-xs px-2.5 py-1.5 rounded-md transition-colors ${
                filter === f.id ? 'bg-accent-bg text-accent font-medium' : 'text-neutral-500 hover:text-neutral-900 hover:bg-neutral-100'
              }`}
            >
              {f.name} <span className="font-mono text-[10px] opacity-60">{f.count}</span>
            </button>
          ))}
        </div>

        {filtered.length === 0 ? (
          <div className="text-center py-12 text-neutral-400 text-sm">
            {promises.length === 0 ? (
              <>
                Тут будут твои обещания — себе или кому-то.<br />
                <span className="text-neutral-300 text-xs">Лучше меньше, чем нарушать.</span>
              </>
            ) : 'Здесь пусто'}
          </div>
        ) : (
          <div className="space-y-2">
            {filtered.map((p, i) => {
              const overdue = isOverdue(p);
              return (
                <div
                  key={p.id}
                  className={`p-4 rounded-xl border transition-colors animate-fade-up ${
                    overdue ? 'border-amber-200 bg-amber-50/40' : 'border-line hover:border-neutral-300'
                  }`}
                  style={{ animationDelay: `${i * 40}ms` }}
                >
                  <div className="flex items-start gap-3 mb-3">
                    <input
                      type="text"
                      value={p.title}
                      onChange={(e) => updateP(p.id, { title: e.target.value })}
                      onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); addPromise(); } }}
                      data-input="promise-title"
                      placeholder="Что обещаю"
                      className={`flex-1 bg-transparent text-base font-medium outline-none placeholder:text-neutral-300 ${
                        p.status === PROMISE_STATUS.KEPT ? 'line-through text-neutral-400' : ''
                      }`}
                    />
                    <IconBtn onClick={() => removeP(p.id)} title="Удалить" danger>
                      <Icon name="trash" className="w-4 h-4" />
                    </IconBtn>
                  </div>
                  <div className="flex flex-wrap items-center gap-2 sm:gap-3">
                    <div className="inline-flex items-center gap-1.5 text-xs text-neutral-500">
                      <span className="text-neutral-400">кому:</span>
                      <input
                        type="text"
                        value={p.to}
                        onChange={(e) => updateP(p.id, { to: e.target.value })}
                        placeholder="себе, другу, команде..."
                        className="bg-transparent outline-none w-32 placeholder:text-neutral-300"
                      />
                    </div>
                    <div className="inline-flex items-center gap-1.5 text-xs text-neutral-500">
                      <span className="text-neutral-400">до:</span>
                      <input
                        type="date"
                        value={p.deadline}
                        onChange={(e) => updateP(p.id, { deadline: e.target.value })}
                        className="bg-transparent outline-none"
                      />
                    </div>
                    <select
                      value={p.status || ''}
                      onChange={(e) => updateP(p.id, { status: e.target.value || null })}
                      className={`text-xs font-medium px-2.5 py-1 rounded-md border outline-none cursor-pointer transition-colors ml-auto ${promiseStatusColor(p.status)}`}
                    >
                      {PROMISE_STATUS_LIST.map((s) => <option key={s} value={s}>{s}</option>)}
                    </select>
                  </div>
                  {overdue && (
                    <div className="text-[11px] text-amber-700 mt-2 inline-flex items-center gap-1">
                      <span className="w-1 h-1 rounded-full bg-amber-600" />
                      Срок прошёл
                    </div>
                  )}
                  <input
                    type="text"
                    value={p.note}
                    onChange={(e) => updateP(p.id, { note: e.target.value })}
                    placeholder="Заметка"
                    className="w-full mt-3 bg-transparent text-xs text-neutral-500 outline-none placeholder:text-neutral-300"
                  />
                </div>
              );
            })}
          </div>
        )}
      </Card>
    </div>
  );
}

          <div className="flex items-center gap-3 flex-wrap">

                placeholder="Название"
                className="flex-1 bg-transparent text-sm outline-none placeholder:text-neutral-300"

        <div className="space-y-2">
          {settings.incomeSources.map((s, i) => (

                type="text"
                value={s.name}
                onChange={(e) => updateSource(s.id, { name: e.target.value })}

                data-input="source-name"
                placeholder="Название"
                className="flex-1 bg-transparent text-sm outline-none placeholder:text-neutral-300"
              />
              <input type="number" inputMode="numeric" value={s.plan} onChange={(e) => updateSource(s.id, { plan: +e.target.value })} placeholder="План" className="w-32 bg-transparent text-sm font-mono text-right outline-none tabular-nums" />

              </IconBtn>
            </div>
          ))}

      </Card>

      <Card>
        <SectionTitle>Управление данными</SectionTitle>
        <div className="space-y-2 text-sm text-neutral-600">

          <div className="flex gap-2 mt-4 flex-wrap">
            <button
              onClick={() => {
                const all = {};
                for (let i = 0; i < localStorage.length; i++) {
                  const k = localStorage.key(i);
                  if (k.startsWith('planner:')) all[k] = localStorage.getItem(k);
                }
                const blob = new Blob([JSON.stringify(all, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `planner-backup-${new Date().toISOString().slice(0,10)}.json`;
                a.click();
                URL.revokeObjectURL(url);
              }}
              className="px-3 py-2 rounded-lg bg-accent text-white text-xs font-medium hover:opacity-90 transition-opacity"
            >
              Экспорт
            </button>
            <label className="px-3 py-2 rounded-lg bg-white border border-neutral-300 text-neutral-700 text-xs font-medium hover:bg-neutral-50 transition-colors cursor-pointer">
              Импорт
              <input
                type="file" accept="application/json" className="hidden"
                onChange={(e) => {
                  const f = e.target.files[0];
                  if (!f) return;
                  const r = new FileReader();
                  r.onload = (ev) => {
                    try {
                      const data = JSON.parse(ev.target.result);
                      Object.entries(data).forEach(([k, v]) => localStorage.setItem(k, v));
                      window.location.reload();
                    } catch (err) { alert('Ошибка импорта: ' + err.message); }
                  };
                  r.readAsText(f);
                }}
              />
            </label>
            <button
              onClick={() => {
                if (!confirm('Заменить текущий список категорий на Сбер-дефолтные? Это удалит твои текущие категории (но не транзакции).')) return;
                updateSettings((s) => ({
                  ...s,
                  categories: [
                    { id: uid(), name: 'Супермаркеты', budget: 0 },
                    { id: uid(), name: 'Кафе, рестораны, фастфуд', budget: 0 },
                    { id: uid(), name: 'Транспорт', budget: 0 },
                    { id: uid(), name: 'Такси и каршеринг', budget: 0 },
                    { id: uid(), name: 'ЖКХ, связь, интернет', budget: 0 },
                    { id: uid(), name: 'Аптеки', budget: 0 },
                    { id: uid(), name: 'Спорт и фитнес', budget: 0 },
                    { id: uid(), name: 'Хобби и развлечения', budget: 0 },
                    { id: uid(), name: 'Кино и театр', budget: 0 },
                    { id: uid(), name: 'Подписки', budget: 0 },
                    { id: uid(), name: 'Путешествия', budget: 0 },
                    { id: uid(), name: 'Бытовые услуги', budget: 0 },
                    { id: uid(), name: 'Услуги страхования', budget: 0 },
                    { id: uid(), name: 'Переводы людям', budget: 0 },
                    { id: uid(), name: 'Лотереи, казино и азартные игры', budget: 0 },
                    { id: uid(), name: 'Прочее', budget: 0 },
                  ],
                }));
              }}
              className="px-3 py-2 rounded-lg bg-white border border-neutral-300 text-neutral-700 text-xs font-medium hover:bg-neutral-50 transition-colors"
            >
              Сбросить категории (Сбер)
            </button>
            <button
              onClick={async () => {
                if (!confirm('Удалить ВСЕ внесённые расходы во всех месяцах? Это действие нельзя отменить.')) return;
                let removed = 0;
                const monthKeys = [];
                for (let i = 0; i < localStorage.length; i++) {
                  const k = localStorage.key(i);
                  if (k && k.startsWith('planner:month:')) monthKeys.push(k);
                }
                for (const k of monthKeys) {
                  try {
                    const md = JSON.parse(localStorage.getItem(k));
                    if (md && Array.isArray(md.expenses)) {
                      removed += md.expenses.length;
                      md.expenses = [];
                      localStorage.setItem(k, JSON.stringify(md));
                    }
                  } catch {}
                }
                alert(`Удалено расходов: ${removed}. Страница сейчас перезагрузится.`);
                window.location.reload();
              }}
              className="px-3 py-2 rounded-lg bg-rose-50 border border-rose-200 text-rose-700 text-xs font-medium hover:bg-rose-100 transition-colors"
            >
              Удалить все расходы
            </button>
          </div>
        </div>
      </Card>
    </div>
  );
}

const SECTIONS = [
  { id: 'dashboard', name: 'Дашборд', icon: 'layout' },
  { id: 'plan-day', name: 'План дня', icon: 'calendar' },
  { id: 'plan-week', name: 'Неделя', icon: 'file' },
  { id: 'goals', name: 'Цели', icon: 'target' },
  { id: 'habits', name: 'Привычки', icon: 'repeat' },
  { id: 'promises', name: 'Обещания', icon: 'feather' },
  { id: 'checklists', name: 'Чек-листы', icon: 'list-checks' },
  { id: 'expenses', name: 'Расходы', icon: 'wallet' },
  { id: 'income', name: 'Доходы', icon: 'trending-up' },
  { id: 'analytics', name: 'Аналитика', icon: 'bar-chart' },
  { id: 'settings', name: 'Настройки', icon: 'settings' },
];

function App() {
  const [ym, setYm] = useState(currentYM());
  const [section, setSection] = useState('dashboard');
  const [data, setData] = useState(null);
  const [prevData, setPrevData] = useState(null);
  const [history, setHistory] = useState([]);
  const [settings, setSettings] = useState(null);
  const [checklists, setChecklists] = useState(null);
  const [promises, setPromises] = useState(null);
  const [theme, setTheme] = useState(DEFAULT_THEME);
  const [loading, setLoading] = useState(true);
  const navRef = useRef(null);

  const accentHex = (THEMES[theme] || THEMES[DEFAULT_THEME]).hex;
  const gcal = useGoogleAuth(settings?.googleClientId || '');

  useEffect(() => {
    (async () => {
      const s = await storage.get('settings');
      setSettings(s || { categories: DEFAULT_CATEGORIES, incomeSources: DEFAULT_INCOME_SOURCES });
      const cl = await storage.get('checklists');
      setChecklists(cl ? migrateChecklists(cl) : DEFAULT_CHECKLISTS);
      const pr = await storage.get('promises');
      setPromises(Array.isArray(pr) ? pr : []);
      const t = await storage.get('theme');
      if (t && THEMES[t]) setTheme(t);
    })();
  }, []);

  // Apply theme CSS variables whenever it changes
  useEffect(() => {
    applyTheme(theme);
    storage.set('theme', theme);
  }, [theme]);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      setLoading(true);
      const [cur, prev] = await Promise.all([
        storage.get(`month:${ym}`),
        storage.get(`month:${shiftYM(ym, -1)}`),
      ]);
      if (cancelled) return;
      setData(cur || emptyMonth());
      setPrevData(prev);

      const months = [];
      for (let i = 5; i >= 0; i--) {
        const k = shiftYM(ym, -i);
        const m = await storage.get(`month:${k}`);
        if (m) {
          months.push({
            ym: k,
            income: (m.income || []).reduce((s, e) => s + (+e.amount || 0), 0),
            expense: (m.expenses || []).reduce((s, e) => s + (+e.amount || 0), 0),
          });
        } else {
          months.push({ ym: k, income: 0, expense: 0 });
        }
      }
      if (cancelled) return;
      setHistory(months);
      setLoading(false);
    })();
    return () => { cancelled = true; };
  }, [ym]);

  useEffect(() => {
    if (!data) return;
    storage.set(`month:${ym}`, data);
  }, [data, ym]);

  useEffect(() => { if (settings) storage.set('settings', settings); }, [settings]);
  useEffect(() => { if (checklists) storage.set('checklists', checklists); }, [checklists]);
  useEffect(() => { if (promises !== null) storage.set('promises', promises); }, [promises]);

  const update = useCallback((fn) => setData((d) => fn(d)), []);
  const updateSettings = useCallback((fn) => setSettings((s) => fn(s)), []);
  const updateChecklists = useCallback((fn) => setChecklists((c) => fn(c)), []);
  const updatePromises = useCallback((fn) => setPromises((p) => fn(p)), []);

  useEffect(() => {
    if (!navRef.current) return;
    const btn = navRef.current.querySelector(`[data-section="${section}"]`);
    if (btn) btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }, [section]);

  if (loading || !data || !settings || !checklists || promises === null) {
    return (
      <div className="min-h-screen bg-paper flex items-center justify-center">
        <Icon name="loader" className="w-6 h-6 text-accent animate-spin-slow" />
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-paper text-neutral-900 antialiased">
      <header className="sticky top-0 z-30 bg-paper/90 backdrop-blur-md border-b border-line">
        <div className="max-w-6xl mx-auto px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between gap-3">
          <div className="flex items-center gap-2 sm:gap-3 min-w-0">
            <button onClick={() => setYm(shiftYM(ym, -1))} className="p-1.5 rounded-md text-neutral-500 hover:text-accent hover:bg-accent-bg transition-colors" title="Прошлый месяц">
              <Icon name="chevron-left" className="w-4 h-4" />
            </button>
            <div key={ym} className="flex items-baseline gap-2 whitespace-nowrap animate-fade-in">
              <span className="font-display-italic text-2xl sm:text-3xl font-light tracking-tight text-neutral-900 leading-none">
                {MONTHS_RU[parseYM(ym)[1] - 1]}
              </span>
              <span className="font-display text-lg sm:text-xl font-light text-neutral-400 leading-none tabular-nums">
                {parseYM(ym)[0]}
              </span>
            </div>
            <button onClick={() => setYm(shiftYM(ym, 1))} className="p-1.5 rounded-md text-neutral-500 hover:text-accent hover:bg-accent-bg transition-colors" title="Следующий месяц">
              <Icon name="chevron-right" className="w-4 h-4" />
            </button>
          </div>
          <div className="flex items-center gap-1 sm:gap-2">
            {ym === currentYM() && (
              <span className="inline-flex items-center gap-1.5 text-[10px] font-semibold tracking-[0.14em] uppercase text-accent px-2 py-1 rounded-md bg-accent-bg">
                <span className="w-1.5 h-1.5 rounded-full bg-accent" />
                Сейчас
              </span>
            )}
            {ym !== currentYM() && (
              <button onClick={() => setYm(currentYM())} className="text-[10px] font-semibold tracking-[0.14em] uppercase text-neutral-500 hover:text-accent px-2 py-1 rounded-md hover:bg-accent-bg transition-colors">
                К сегодня
              </button>
            )}
          </div>
        </div>

        <div className="border-t border-line-soft">
          <div className="max-w-6xl mx-auto px-2 sm:px-6">
            <div className="overflow-x-auto hide-scroll" ref={navRef}>
              <div className="flex gap-0.5 py-1">
                {SECTIONS.map((s) => {
                  const active = section === s.id;
                  return (
                    <button key={s.id} data-section={s.id} onClick={() => setSection(s.id)}
                      className={`relative flex-shrink-0 inline-flex items-center gap-1.5 px-3 py-2 text-xs font-medium rounded-md transition-all duration-200 ${active ? 'text-accent' : 'text-neutral-500 hover:text-neutral-900'}`}>
                      <Icon name={s.icon} className={`w-3.5 h-3.5 transition-colors ${active ? 'text-accent' : 'text-neutral-400'}`} />
                      <span>{s.name}</span>
                      {active && <span className="absolute inset-x-2 -bottom-1 h-0.5 bg-accent rounded-full animate-fade-in" />}
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      </header>

      <main className="max-w-6xl mx-auto px-4 sm:px-6 py-6 sm:py-8 pb-24">
        <div key={section + ym} className="animate-fade-up">
          {section === 'dashboard' && <Dashboard data={data} prevData={prevData} settings={settings} ym={ym} accent={accentHex} />}
          {section === 'plan-day' && <PlanDay data={data} update={update} ym={ym} gcal={gcal} />}
          {section === 'plan-week' && <PlanWeek data={data} update={update} />}
          {section === 'goals' && <Goals data={data} update={update} />}
          {section === 'habits' && <Habits data={data} update={update} ym={ym} />}
          {section === 'promises' && <Promises promises={promises} updatePromises={updatePromises} />}
          {section === 'checklists' && <Checklists checklists={checklists} updateChecklists={updateChecklists} />}
          {section === 'expenses' && <Expenses data={data} update={update} settings={settings} ym={ym} />}
          {section === 'income' && <Income data={data} update={update} settings={settings} ym={ym} />}
          {section === 'analytics' && <Analytics data={data} history={history} settings={settings} ym={ym} accent={accentHex} />}
          {section === 'settings' && <Settings settings={settings} updateSettings={updateSettings} theme={theme} setTheme={setTheme} gcal={gcal} />}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
